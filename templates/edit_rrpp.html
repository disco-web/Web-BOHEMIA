{% extends 'layout.html' %}

{% block content %}

<!-- Formulario para editar un RRPP existente -->
<div class="admin-panel">

    <a href="{{ url_for('admin') }}" class="back-link">← Volver al admin</a>
    <h2 class="admin-title">Editar RRPP</h2>

    <form method="POST" enctype="multipart/form-data">

        <!-- Localidad -->
        <input type="text" name="localidad" value="{{ rrpp.localidad }}" placeholder="Localidad" required>

        <!-- Nombre -->
        <input type="text" name="nombre" value="{{ rrpp.nombre }}" placeholder="Nombre" required>

        <!-- Foto actual -->
        {% if rrpp.foto_url %}
        <p style="font-size:12px; color:#aaa;">Foto actual:</p>
        <img src="{{ rrpp.foto_url }}" style="width:80px; height:80px; border-radius:50%; object-fit:cover; margin-bottom:10px;">
        {% endif %}

        <!-- Subir nueva foto -->
        <p style="font-size:12px; color:#aaa;">Subir nueva foto:</p>
        <input type="file" name="foto" accept="image/*">

        <!-- O pegar URL de foto -->
        <input type="text" name="foto_url" value="{{ rrpp.foto_url }}" placeholder="O pegá URL de foto">

        <!-- Instagram -->
        <input type="text" name="instagram" value="{{ rrpp.instagram }}" placeholder="Instagram (sin @)">

        <!-- WhatsApp -->
        <input type="text" name="whatsapp" value="{{ rrpp.whatsapp }}" placeholder="WhatsApp (ej: 5491112345678)">

        <!-- Orden -->
        <input type="number" name="orden" value="{{ rrpp.orden }}" placeholder="Orden de aparición">

        <button type="submit">Guardar cambios</button>

    </form>

</div>

{% endblock %}
