<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Bohemia</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <div class="container">

        <!-- Zona clickeable invisible para acceder al login del admin -->
        <a href="/login" class="hidden-login"></a>

        <!-- Header con logo y texto configurable -->
        <div class="header-section">
            <img src="../static/logo.png" alt="La Bohemia" class="logo-img">
            
            <div class="header-text">qwe</div>
            
        </div>

        <!-- Contenido principal -->
        <div class="main-content">

            <!-- Navegación (se oculta en login y admin) -->
            
            <div class="nav-toggle">
                <a href="../index.html" class="nav-btn inactive">RRPP</a>
                <a href="index.html" class="nav-btn active">Transportes</a>
            </div>
            

            

<!-- Texto de actualización configurable desde el admin -->

<div class="texto-actualizacion">
    <p>qwe</p>
</div>


<!-- Acordeón de ciudades -->
<div class="accordion-section">
    
    <details>

        <!-- Botón de la ciudad -->
        <summary>▼ Arribeños</summary>

        <!-- Contenido de la ciudad -->
        <div class="details-content">
            
                
                <div class="trans-card">

                    <!-- Nombre del servicio -->
                    <div class="card-header-strip">Trafic &#34;Guille&#34;</div>

                    <!-- Nombre del dueño -->
                    <div class="card-owner-strip">Luna</div>

                    <div class="card-body-area">
                        <div class="price-box">

                            <!-- Descripción del servicio -->
                            <div class="desc-text">Viaje + Entrada</div>

                            <!-- Precio -->
                            <div class="precio-text">$18.000</div>

                        </div>
                    </div>

                    <!-- Botón de WhatsApp -->
                    <a href="https://wa.me/+5492364722056" target="_blank" class="wa-button-strip">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="15" height="15" alt="WA">
                        Reservá tu lugar
                    </a>

                </div>
                
            
        </div>

    </details>
    
</div>


        </div>

        <!-- Footer con texto configurable -->
        <footer>
            
            <p style="white-space: pre-wrap;">qwe</p>
            
        </footer>

    </div>
</body>
</html>
